<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa 3D — Provincia de Buenos Aires</title>

  <!-- Fuente Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- MapLibre GL JS (libre, sin token) -->
  <link
    href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
    rel="stylesheet"
  />

  <!-- Estilos propios -->
  <link rel="stylesheet" href="styles.css" />
  <!-- Estilos de la ficha por municipio + panel lateral -->
  <link rel="stylesheet" href="panel-styles.css" />

  <!-- Modo embebido (?embed): se muestra dentro del panel comparativo como pestaña.
       Oculta el header propio para no duplicar el título; conserva el filtro de Presión. -->
  <script>if (location.search.indexOf("embed") > -1) document.documentElement.classList.add("embed");</script>
  <style>
    html.embed #app-header{display:none}
    html.embed #topleft{top:10px}
  </style>
</head>
<body class="tema-claro">
  <div id="map"></div>

  <!-- Bloque superior derecho: encabezado + filtro de intensidad -->
  <div id="topleft">
    <!-- Encabezado -->
    <header id="app-header">
      <div class="brand">3F</div>
      <div class="titles">
        <h1>Panel Comparativo Fiscal Municipal</h1>
        <p>Provincia de Buenos Aires · Municipios de +60.000 habitantes</p>
      </div>
      <button id="tema-toggle" onclick="toggleTema()" title="Cambiar entre tema claro y oscuro">☀ Claro</button>
    </header>

    <!-- Selector de intensidad de presión fiscal (colapsable) -->
    <div id="intensidad" class="filtro collapsed">
      <button class="filtro-toggle" onclick="toggleFiltro('intensidad')" title="Mostrar/ocultar intensidad">
        <span class="filtro-lbl">Presión:</span>
        <span class="filtro-current" id="int-current">Todas</span>
        <span class="chev">▾</span>
      </button>
      <div class="filtro-list">
        <button class="int-btn active" data-int="all" onclick="setIntensidad('all', this)">Todas</button>
        <button class="int-btn" data-int="alta" style="--c:#C84747" onclick="setIntensidad('alta', this)">Alta</button>
        <button class="int-btn" data-int="media" style="--c:#E89547" onclick="setIntensidad('media', this)">Media</button>
        <button class="int-btn" data-int="baja" style="--c:#4F9C7A" onclick="setIntensidad('baja', this)">Baja</button>
      </div>
    </div>
  </div>

  <!-- Cartel de diagnóstico: muestra cualquier error en pantalla -->
  <div id="err-overlay" style="display:none;position:absolute;left:12px;bottom:12px;z-index:3000;max-width:70vw;background:#2a0a0a;color:#ffd7d7;border:1px solid #ff5b5b;border-radius:8px;padding:10px 14px;font-family:monospace;font-size:12px;white-space:pre-wrap;box-shadow:0 4px 20px rgba(0,0,0,.5)"></div>
  <script>
    (function () {
      var box = document.getElementById("err-overlay");
      function showErr(msg) {
        box.style.display = "block";
        box.textContent = "⚠ " + msg;
      }
      window.addEventListener("error", function (e) {
        showErr((e.message || "Error") + (e.filename ? "\n" + e.filename + ":" + e.lineno : ""));
      });
      window.addEventListener("unhandledrejection", function (e) {
        showErr("Promise rechazada: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
      });
      window.__showErr = showErr;
    })();
  </script>

  <!-- Panel lateral con la ficha del municipio (opción B) -->
  <div id="panel-municipio">
    <div id="panel-municipio-bar">
      <span>Panel por municipio</span>
      <button id="panel-municipio-close" title="Cerrar" onclick="cerrarPanel()">×</button>
    </div>
    <div id="panel-municipio-body"></div>
  </div>

  <!-- MapLibre GL JS (libre, sin token) -->
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <!-- Datos + funciones del dashboard (define DATA y renderPmunFicha) -->
  <script src="panel-data.js"></script>
  <!-- Script propio del mapa (usa DATA / renderPmunFicha) -->
  <script src="script.js"></script>
</body>
</html>
